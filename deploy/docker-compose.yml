services:
  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    environment:
      MCP_ROUTER_APP_ENV: development
      MCP_ROUTER_PORT: 8000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mcp_router
      POSTGRES_USER: mcp_router
      POSTGRES_PASSWORD: mcp_router
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mcp_router -d mcp_router"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

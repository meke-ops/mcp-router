apiVersion: v1
kind: ConfigMap
metadata:
  name: mcp-router-config
data:
  MCP_ROUTER_APP_ENV: production
  MCP_ROUTER_PORT: "8000"
  MCP_ROUTER_LOG_LEVEL: INFO
  MCP_ROUTER_LOG_FORMAT: json
  MCP_ROUTER_METRICS_ENABLED: "true"
  MCP_ROUTER_REQUIRE_DEPENDENCIES_FOR_READINESS: "false"
  MCP_ROUTER_READINESS_PROBE_TIMEOUT_SECONDS: "1.5"
  MCP_ROUTER_TOOL_CALL_RATE_LIMIT_CAPACITY: "60"
  MCP_ROUTER_TOOL_CALL_RATE_LIMIT_REFILL_RATE: "30.0"
  MCP_ROUTER_TOOL_CALL_CONCURRENCY_LIMIT: "8"
  MCP_ROUTER_CONTROL_PLANE_ALLOWED_ROLES: control-plane,admin
